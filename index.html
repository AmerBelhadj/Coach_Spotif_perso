<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Programme personnalisé diastasis & recomposition corporelle Basic Fit — 16 semaines" />
  <title>Coach Diastasis — Programme 16 semaines</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1A2B4A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CoachDiastasis" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <div id="app">
    <!-- Splash Screen -->
    <div id="splash" class="splash">
      <div class="splash-logo">
        <div class="splash-icon">💪</div>
        <h1>Coach Diastasis</h1>
        <p>Programme 16 semaines</p>
      </div>
      <div class="splash-loader">
        <div class="loader-bar"></div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="main-app hidden">
      <!-- Header -->
      <header id="app-header" class="app-header">
        <div class="header-content">
          <div class="header-left">
            <button class="btn-icon" id="btn-back" style="display:none" aria-label="Retour">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            </button>
            <div class="header-title-group">
              <h2 id="page-title">Tableau de bord</h2>
              <span id="page-subtitle" class="page-subtitle"></span>
            </div>
          </div>
          <div class="header-right">
            <button class="btn-icon" id="btn-theme" aria-label="Changer thème">
              <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="btn-icon" id="btn-notif" aria-label="Notifications">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main id="page-content" class="page-content"></main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-item active" data-page="dashboard" aria-label="Accueil">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Accueil</span>
        </button>
        <button class="nav-item" data-page="seance" aria-label="Séance">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v16M10 5v16M6 8h4M6 16h4M18 5v16M14 5v16M14 8h4M14 16h4"/></svg>
          <span>Séance</span>
        </button>
        <button class="nav-item" data-page="progression" aria-label="Charges">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          <span>Charges</span>
        </button>
        <button class="nav-item" data-page="nutrition" aria-label="Nutrition">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 4.97-7 13-7 13S5 13.97 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2"/></svg>
          <span>Nutrition</span>
        </button>
        <button class="nav-item" data-page="suivi" aria-label="Suivi">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Suivi</span>
        </button>
      </nav>

      <!-- Toast Container -->
      <div id="toast-container" class="toast-container" aria-live="polite"></div>

      <!-- Modal Overlay -->
      <div id="modal-overlay" class="modal-overlay hidden"></div>
      <div id="modal-container" class="modal-container hidden"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data/programme.js"></script>
  <script src="js/data/exercices.js"></script>
  <script src="js/data/nutrition.js"></script>
  <script src="js/utils/db.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/diastasisSafety.js"></script>
  <script src="js/store/store.js"></script>
  <script src="js/components/ui.js"></script>
  <script src="js/components/progressRing.js"></script>
  <script src="js/components/setLogger.js"></script>
  <script src="js/components/restTimer.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/seance.js"></script>
  <script src="js/pages/progression.js"></script>
  <script src="js/pages/nutrition.js"></script>
  <script src="js/pages/suivi.js"></script>
  <script src="js/pages/profil.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW error:', err));
      });
    }
  </script>
</body>
</html>
